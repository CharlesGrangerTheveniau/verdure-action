name: 'Verdure — Carbon & Performance'
description: 'Carbon and performance regression checks for web apps. Diffs every deploy against the previous baseline.'
author: 'verdure-io'

inputs:
  url:
    description: 'URL to scan. Auto-detected from deployment events when not set.'
    required: false
    default: ''
  sitemap-url:
    description: 'Sitemap URL to scan multiple routes (e.g. https://example.com/sitemap.xml). Capped at 20 URLs.'
    required: false
    default: ''
  vercel-bypass-secret:
    description: 'Vercel Protection Bypass for Automation secret. Required if Vercel Deployment Protection is enabled.'
    required: false
    default: ''
  token:
    description: 'GITHUB_TOKEN — needs pull-requests:write, checks:write, and actions:read'
    required: true
  carbon-budget:
    description: 'Max CO₂ grams per visit (SWD model). Fails check if exceeded.'
    required: false
    default: ''
  weight-budget:
    description: 'Max page weight in KB. Fails check if exceeded.'
    required: false
    default: ''
  fail-on-regression:
    description: 'Fail check if regression exceeds 5% threshold'
    required: false
    default: 'true'

outputs:
  carbon-grams:
    description: 'Estimated CO₂ per visit (SWD model)'
    value: ${{ steps.scan.outputs.carbon-grams }}
  page-weight-kb:
    description: 'Total page weight in KB'
    value: ${{ steps.scan.outputs.page-weight-kb }}
  regression:
    description: '"true" / "false" / "none" (no baseline yet)'
    value: ${{ steps.diff.outputs.regression }}

runs:
  using: composite
  steps:
    - name: Install dependencies
      shell: bash
      run: npm ci --prefix ${{ github.action_path }}

    - name: Detect mode
      id: mode
      shell: bash
      run: node ${{ github.action_path }}/src/detect-mode.mjs
      env:
        VERDURE_TOKEN: ${{ inputs.token }}

    - name: Scan
      id: scan
      shell: bash
      run: node ${{ github.action_path }}/src/scan.mjs
      env:
        VERDURE_URL: ${{ github.event.deployment_status.target_url || inputs.url }}
        VERDURE_SITEMAP_URL: ${{ inputs.sitemap-url }}
        VERDURE_BYPASS_SECRET: ${{ inputs.vercel-bypass-secret }}

    - name: Find baseline run
      id: find-baseline
      if: steps.mode.outputs.is_pr == 'true'
      shell: bash
      run: |
        RUN_ID=$(gh api "repos/$GITHUB_REPOSITORY/actions/artifacts?name=verdure-baseline&per_page=5" \
          --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | last | .workflow_run.id // ""')
        echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ inputs.token }}

    - name: Download baseline
      if: steps.mode.outputs.is_pr == 'true' && steps.find-baseline.outputs.run_id != ''
      uses: actions/download-artifact@v4
      with:
        name: verdure-baseline
        path: ./.verdure-baseline
        run-id: ${{ steps.find-baseline.outputs.run_id }}
        github-token: ${{ inputs.token }}
      continue-on-error: true

    - name: Diff
      id: diff
      shell: bash
      run: node ${{ github.action_path }}/src/diff.mjs
      env:
        VERDURE_IS_PR: ${{ steps.mode.outputs.is_pr }}
        VERDURE_CARBON_BUDGET: ${{ inputs.carbon-budget }}
        VERDURE_WEIGHT_BUDGET: ${{ inputs.weight-budget }}

    - name: Upload baseline
      if: steps.mode.outputs.is_baseline == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: verdure-baseline
        path: verdure-scan.json
        retention-days: 90
        overwrite: true

    - name: Report
      shell: bash
      run: node ${{ github.action_path }}/src/report.mjs
      env:
        VERDURE_TOKEN: ${{ inputs.token }}
        VERDURE_FAIL_ON_REGRESSION: ${{ inputs.fail-on-regression }}
        VERDURE_PR_NUMBER: ${{ steps.mode.outputs.pr_number }}
        VERDURE_HEAD_SHA: ${{ steps.mode.outputs.head_sha }}

branding:
  icon: 'activity'
  color: 'green'
